<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Toonii mashin</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f5e7d2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            margin: 0;
            font-size: 38px;
            font-weight: bold;
            color: #111;
            text-align: center;
        }

        .calculator {
            width: 430px;
            background: #f7ead7;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        #display {
            width: 100%;
            height: 90px;
            box-sizing: border-box;
            background: #05060c;
            color: white;
            font-size: 48px;
            text-align: right;
            border-radius: 10px;
            border: 2px solid #777;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 84px;
            border: none;
            border-radius: 9px;
            font-size: 30px;
            color: white;
            background: #262632;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }

        .top {
            background: #3e3e56;
        }

        .operator, .equal {
            background: #c46f00;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>&#1058;&#1086;&#1086;&#1085;&#1099; &#1084;&#1072;&#1096;&#1080;&#1085;</h1>

        <div class="calculator">
            <input id="display" type="text" value="0" readonly>

            <div class="buttons">
                <button class="top" onclick="clearDisplay()">C</button>
                <button class="top" onclick="toggleSign()">+/-</button>
                <button class="top" onclick="appendOperator('/')">/</button>
                <button class="top" onclick="appendOperator('**')">x<sup>y</sup></button>

                <button class="top" onclick="sqrtValue()">&#8730;</button>
                <button class="top" onclick="percentValue()">%</button>
                <button onclick="appendNumber('9')">9</button>
                <button onclick="appendNumber('.')">.</button>

                <button onclick="appendNumber('6')">6</button>
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button class="operator" onclick="appendOperator('*')">*</button>

                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="operator" onclick="appendOperator('-')">-</button>

                <button onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button class="operator" onclick="appendOperator('+')">+</button>

                <button class="equal" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById("display");

        function appendNumber(value) {
            if (display.value === "0" || display.value === "Error") {
                display.value = value;
            } else {
                display.value += value;
            }
        }

        function appendOperator(value) {
            if (display.value === "Error") {
                display.value = "0";
                return;
            }
            display.value += value;
        }

        function clearDisplay() {
            display.value = "0";
        }

        function toggleSign() {
            if (display.value !== "0" && display.value !== "Error") {
                if (display.value.startsWith("-")) {
                    display.value = display.value.substring(1);
                } else {
                    display.value = "-" + display.value;
                }
            }
        }

        function sqrtValue() {
            try {
                let result = Math.sqrt(eval(display.value));
                display.value = formatResult(result);
            } catch {
                display.value = "Error";
            }
        }

        function percentValue() {
            try {
                let result = eval(display.value) / 100;
                display.value = formatResult(result);
            } catch {
                display.value = "Error";
            }
        }

        function calculate() {
            try {
                let result = eval(display.value);
                display.value = formatResult(result);
            } catch {
                display.value = "Error";
            }
        }

        function formatResult(value) {
            if (!isFinite(value)) return "Error";
            return Number.isInteger(value) ? value.toString() : value.toFixed(6).replace(/0+$/, "").replace(/\.$/, "");
        }
    </script>
</body>
</html>
